<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel - Responsive Landing Page</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    
    <header class="header">
        <div class="top-content">
        <!-- Navigation bar for the mobile version -->
        <nav class="mobile-menu">
        <!-- Website logo -->
        <p class="logo"><strong>Travel</strong></p>
        <!-- Menu icon (static image) -->
        <img src="images/icons/menu.svg" alt="Menu icon" class="menu-icon">
        </nav>
        </div>
    </header>

    <main>
        <!-- hero section -->
        <section class="hero">  
        <div class="content">
            <!-- Main page title -->
            <h1 class="title">
            <span class="highlight">Travel</span> around the world
            </h1>
            <!-- Image of travelers -->
            <img src="images/img/Image.png" alt="Two happy travelers taking a selfie" class="travel-image">
        </div>
        </section>


</main>
</body>
</html>
